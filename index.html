<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roller Derby — Spectator Guide</title>
<link rel="stylesheet" href="default.css">
</head>
<body>
<div class="app">
  <header>
    <div class="header-top">
      <h1>Roller Derby Guide</h1>
      <span class="subtitle">Tap any play to see it explained</span>
    </div>
    <div class="position-legend">
      <div class="pos-item" data-tip="Scores points by lapping the opposing team">
        <div class="pos-dot">★</div>
        <span>Jammer</span>
      </div>
      <div class="pos-item" data-tip="Can receive the star and become the jammer">
        <div class="pos-dot" style="font-size:7px;letter-spacing:-1px">▬</div>
        <span>Pivot</span>
      </div>
      <div class="pos-item" data-tip="Blocks the opposing jammer and assists their own">
        <div class="pos-dot"></div>
        <span>Blocker</span>
      </div>
    </div>
    <div class="filter-bar" id="filterBar"></div>
  </header>
  <div class="content">
    <div class="grid-area"><div class="grid" id="cardGrid"></div></div>
    <aside class="panel" id="panel" role="complementary" aria-label="Play detail">
      <div class="panel-inner" id="panelInner"></div>
    </aside>
  </div>
</div>
<script src="default.js"></script>
</body>
</html>
